    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif; background: var(--apple-bg); color: var(--apple-text); -webkit-font-smoothing: antialiased; }
    .glass { background: rgba(255,255,255,0.72); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); }

    .card:hover { box-shadow: 0 8px 30px rgba(0,0,0,0.12); transform: translateY(-2px); }
    .card-flat { background: var(--apple-card); border-radius: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
    .apple-input { width: 100%; padding: 14px 16px; background: #f5f5f7; border: 2px solid transparent; border-radius: 12px; font-size: 15px; font-family: inherit; outline: none; transition: all 0.3s ease; color: var(--apple-text); }
    .apple-input:focus { background: #fff; border-color: var(--apple-blue); box-shadow: 0 0 0 4px rgba(0,122,255,0.12); }
    .apple-input::placeholder { color: #c7c7cc; }
    .apple-btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 24px; border-radius: 980px; font-size: 15px; font-weight: 500; border: none; cursor: pointer; transition: all 0.3s cubic-bezier(0.25,0.46,0.45,0.94); font-family: inherit; letter-spacing: -0.01em; }
    .apple-btn:active { transform: scale(0.96); }
    .apple-btn-primary { background: var(--apple-blue); color: #fff; }
    .apple-btn-primary:hover { background: #0066d6; }
    .apple-btn-secondary { background: rgba(0,122,255,0.1); color: var(--apple-blue); }
    .apple-btn-secondary:hover { background: rgba(0,122,255,0.16); }
    .apple-btn-ghost { background: transparent; color: var(--apple-blue); }
    .apple-btn-ghost:hover { background: rgba(0,122,255,0.06); }
    .apple-btn-danger { background: rgba(255,59,48,0.1); color: var(--apple-red); }
    .apple-pill { display: inline-flex; align-items: center; gap: 4px; padding: 5px 12px; border-radius: 980px; font-size: 12px; font-weight: 600; }
    .pill-blue { background: rgba(0,122,255,0.1); color: var(--apple-blue); }
    .pill-green { background: rgba(52,199,89,0.1); color: var(--apple-green); }
    .pill-orange { background: rgba(255,149,0,0.1); color: var(--apple-orange); }
    .pill-red { background: rgba(255,59,48,0.1); color: var(--apple-red); }
    .pill-purple { background: rgba(175,82,222,0.1); color: var(--apple-purple); }
    .pill-gray { background: rgba(142,142,147,0.1); color: var(--apple-gray); }
    .apple-tab { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: 980px; font-size: 14px; font-weight: 500; border: none; cursor: pointer; transition: all 0.3s ease; font-family: inherit; background: transparent; color: var(--apple-gray); }
    .apple-tab.active { background: var(--apple-blue); color: #fff; }
    .apple-tab:not(.active):hover { background: rgba(0,0,0,0.04); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    .animate-fadeUp { animation: fadeUp 0.5s cubic-bezier(0.25,0.46,0.45,0.94); }
    .animate-scaleIn { animation: scaleIn 0.3s cubic-bezier(0.25,0.46,0.45,0.94); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 3px; }
  </style>

    // ==================== 路由 & 认证 ====================
    const RouterContext = createContext();
    const AuthContext = createContext();

    function Router(props) {
      const [path, setPath] = useState(window.location.hash.slice(1) || "/");
      useEffect(function() {
        function h() { setPath(window.location.hash.slice(1) || "/"); }
        window.addEventListener("hashchange", h);
        return function() { window.removeEventListener("hashchange", h); };
      }, []);
      function navigate(p) { window.location.hash = p; }
      var params = {};
      var m = path.match(/\/(\w+)\/(\d+)/);
      if (m) { params.type = m[1]; params.id = m[2]; }
      return <RouterContext.Provider value={{ path, navigate, params }}>{props.children}</RouterContext.Provider>;
    }
    function useRouter() { return useContext(RouterContext); }

    function AuthProvider(props) {
      var [user, setUser] = useState(null);
      useEffect(function() {
        var saved = localStorage.getItem("meeting_user");
        if (saved) { try { setUser(JSON.parse(saved)); } catch(e) {} }
      }, []);
      function login(email, password) {
        var found = usersDB.find(function(u) { return u.email === email && u.password === password; });
        if (found) { setUser(found); localStorage.setItem("meeting_user", JSON.stringify(found)); return true; }
        return false;
      }
      function logout() { setUser(null); localStorage.removeItem("meeting_user"); }
      return <AuthContext.Provider value={{ user, login, logout }}>{props.children}</AuthContext.Provider>;
    }
    function useAuth() { return useContext(AuthContext); }

    // ==================== Toast ====================
    function Toast(props) {
      var ref = useRef(props.onClose);
      ref.current = props.onClose;
      useEffect(function() { var t = setTimeout(function() { ref.current(); }, 2800); return function() { clearTimeout(t); }; }, []);
      var colors = { success: { bg: "rgba(52,199,89,0.9)", icon: "ri-check-line" }, error: { bg: "rgba(255,59,48,0.9)", icon: "ri-error-warning-line" }, info: { bg: "rgba(0,122,255,0.9)", icon: "ri-information-line" } };
      var c = colors[props.type] || colors.success;
      return (
        <div className="animate-scaleIn" style={{ position: "fixed", top: 24, left: "50%", transform: "translateX(-50%)", zIndex: 9999, background: c.bg, backdropFilter: "blur(20px)", color: "#fff", padding: "14px 28px", borderRadius: 980, boxShadow: "0 8px 32px rgba(0,0,0,0.18)", display: "flex", alignItems: "center", gap: 10, fontSize: 15, fontWeight: 500 }}>
          <i className={c.icon} style={{ fontSize: 20 }}></i>{props.message}
        </div>
      );
    }
    function useToast() {
      var [toast, setToast] = useState(null);
      return [toast, function(msg, type) { setToast({ message: msg, type: type || "success" }); }, function() { setToast(null); }];
    }

          <div onClick={function(e){ e.stopPropagation(); }} className="animate-fadeUp" style={{ background: "#fff", borderRadius: 24, padding: 32, maxWidth: 600, width: "100%", maxHeight: "80vh", overflowY: "auto", boxShadow: "0 20px 60px rgba(0,0,0,0.2)" }}>{props.children}</div>
        </div>
      );
    }

                    <div style={{ width: 64, height: 64, borderRadius: 18, background: "linear-gradient(135deg, #007AFF, #5856D6)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", color: "#fff", flexShrink: 0 }}>

                      </div>
                      <div style={{ display: "flex", gap: 8 }}>{nextMeeting.agenda.map(function(a, i) { return <span key={i} className="apple-pill pill-gray" style={{ fontSize: 11 }}>{a}</span>; })}</div>

                  var mDone = mTodos.filter(function(t) { return t.status === "done"; }).length;

    // ==================== 新建会议 ====================
    function CreateMeetingPage() {
      var router = useRouter();
      var [toast, showToast, hideToast] = useToast();
      var [form, setForm] = useState({ title: "", start_time: "", end_time: "", location: "", description: "", agenda: [""], participants: [], reminders: [30] });
      function setField(key, val) { var n = Object.assign({}, form); n[key] = val; setForm(n); }
      function applyTemplate(e) { var tpl = agendaTemplates.find(function(t) { return t.id === parseInt(e.target.value); }); if (tpl) { setField("agenda", tpl.items.slice()); showToast("已应用「" + tpl.name + "」模板"); } }
      function addAgenda() { setField("agenda", form.agenda.concat([""])); }
      function updateAgenda(idx, val) { var arr = form.agenda.slice(); arr[idx] = val; setField("agenda", arr); }
      function removeAgenda(idx) { if (form.agenda.length > 1) setField("agenda", form.agenda.filter(function(_, i) { return i !== idx; })); }
      function toggleParticipant(pid) { if (form.participants.indexOf(pid) >= 0) setField("participants", form.participants.filter(function(id) { return id !== pid; })); else setField("participants", form.participants.concat([pid])); }
      function toggleReminder(mins) { if (form.reminders.indexOf(mins) >= 0) setField("reminders", form.reminders.filter(function(m) { return m !== mins; })); else setField("reminders", form.reminders.concat([mins])); }
      function handleSubmit(e) { e.preventDefault(); if (!form.title.trim()) { showToast("请填写会议主题", "error"); return; } showToast("会议创建成功！"); setTimeout(function() { router.navigate("/"); }, 1500); }

      return (
        <div style={{ minHeight: "100vh", background: "var(--apple-bg)" }}>
          {toast && <Toast message={toast.message} type={toast.type} onClose={hideToast} />}
          <div className="glass" style={{ position: "sticky", top: 0, zIndex: 10, borderBottom: "0.5px solid rgba(0,0,0,0.1)" }}>
            <div style={{ maxWidth: 720, margin: "0 auto", padding: "14px 24px", display: "flex", alignItems: "center", gap: 16 }}>
              <button className="apple-btn apple-btn-ghost" onClick={function() { router.navigate("/"); }} style={{ padding: 8 }}><i className="ri-arrow-left-line" style={{ fontSize: 22 }}></i></button>
              <h1 style={{ fontSize: 17, fontWeight: 600 }}>新建会议</h1>
            </div>
          </div>
          <form onSubmit={handleSubmit} style={{ maxWidth: 720, margin: "0 auto", padding: "32px 24px" }}>
            <div className="card-flat" style={{ padding: 28, marginBottom: 20 }}>
              <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 24, display: "flex", alignItems: "center", gap: 10 }}><span style={{ width: 32, height: 32, borderRadius: 10, background: "linear-gradient(135deg, #007AFF, #5AC8FA)", display: "inline-flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 16 }}><i className="ri-information-line"></i></span>基本信息</h2>
              <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
                <div><label style={{ display: "block", fontSize: 14, fontWeight: 600, marginBottom: 8 }}>会议主题</label><input className="apple-input" placeholder="输入会议主题" value={form.title} onChange={function(e){ setField("title", e.target.value); }} /></div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                  <div><label style={{ display: "block", fontSize: 14, fontWeight: 600, marginBottom: 8 }}>开始时间</label><input type="datetime-local" className="apple-input" value={form.start_time} onChange={function(e){ setField("start_time", e.target.value); }} /></div>
                  <div><label style={{ display: "block", fontSize: 14, fontWeight: 600, marginBottom: 8 }}>结束时间</label><input type="datetime-local" className="apple-input" value={form.end_time} onChange={function(e){ setField("end_time", e.target.value); }} /></div>

                      </div>
                    </div>
                    <select value={res.decision} onChange={function(e){ updateRes(res.id, "decision", e.target.value); }} className="apple-input" style={{ width: 90, padding: "8px 10px", fontSize: 13 }}><option value="待定">待定</option><option value="通过">通过</option><option value="否决">否决</option></select>
                  </div>
                </div>); })}
              </div>
              <div className="card-flat" style={{ padding: 28 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 20 }}><div style={{ width: 36, height: 36, borderRadius: "50%", background: "rgba(52,199,89,0.1)", display: "flex", alignItems: "center", justifyContent: "center", color: "var(--apple-green)", fontSize: 18 }}><i className="ri-calendar-event-line"></i></div><h3 style={{ fontSize: 17, fontWeight: 600 }}>下次预埋</h3></div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                  <div className="card" onClick={function(){ router.navigate("/create"); }} style={{ padding: 20, cursor: "pointer" }}><div style={{ display: "flex", alignItems: "center", gap: 14 }}><div style={{ width: 48, height: 48, borderRadius: 14, background: "linear-gradient(135deg, #34C759, #30D158)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 22 }}><i className="ri-add-circle-line"></i></div><div><div style={{ fontWeight: 600, fontSize: 15 }}>创建跟进会议</div><div style={{ fontSize: 12, color: "var(--apple-text2)" }}>自动继承议题</div></div></div></div>
                  <div className="card" onClick={function(){ showToast("已归档到知识库"); }} style={{ padding: 20, cursor: "pointer" }}><div style={{ display: "flex", alignItems: "center", gap: 14 }}><div style={{ width: 48, height: 48, borderRadius: 14, background: "linear-gradient(135deg, #007AFF, #5AC8FA)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 22 }}><i className="ri-archive-line"></i></div><div><div style={{ fontWeight: 600, fontSize: 15 }}>归档到知识库</div><div style={{ fontSize: 12, color: "var(--apple-text2)" }}>存档到项目目录</div></div></div></div>
                </div>
              </div>
            </div>)}
          </div>
        </div>
      );
    }

    // ==================== 入口 ====================
    function App() {
      return (
        <AuthProvider>
          <Router>
            <AppContent />
          </Router>
        </AuthProvider>
      );
    }
    function AppContent() {
      var auth = useAuth();
      var ctx = useRouter();
      if (!auth.user) return <LoginPage />;
      if (ctx.path === "/") return <HomePage />;
      if (ctx.path === "/create") return <CreateMeetingPage />;
      if (ctx.path.indexOf("/meeting/") === 0) return <MeetingDetailPage />;
      return <HomePage />;
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
