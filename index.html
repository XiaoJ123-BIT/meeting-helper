<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>会议助手 - 轻量级会议管理工具</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'fade-in': 'fadeIn 0.3s ease-in-out',
            'slide-in': 'slideIn 0.3s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            slideIn: {
              '0%': { transform: 'translateX(-20px)', opacity: '0' },
              '100%': { transform: 'translateX(0)', opacity: '1' },
            },
          },
        },
      },
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; margin: 0; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, createContext, useContext, useCallback, useMemo } = React;

    // ==================== 数据 ====================
    const initialMeetings = [
      { id: 1, title: "产品规划评审会", start_time: "2026-05-16T14:00:00", end_time: "2026-05-16T16:00:00", location: "A301会议室", status: "upcoming", description: "评审Q3产品路线图与核心功能优先级", creator: "王经理", agenda: ["回顾Q2数据", "讨论Q3规划", "确定优先级"] },
      { id: 2, title: "技术架构周会", start_time: "2026-05-16T10:00:00", end_time: "2026-05-16T11:30:00", location: "线上-腾讯会议", status: "ongoing", description: "讨论微服务拆分与数据库迁移方案", creator: "李总监", agenda: ["架构评审", "迁移方案讨论"] },
      { id: 3, title: "设计评审会", start_time: "2026-05-17T09:00:00", end_time: "2026-05-17T10:30:00", location: "B205会议室", status: "upcoming", description: "评审新版本UI设计方案", creator: "张设计", agenda: ["新版首页设计", "交互优化"] },
      { id: 4, title: "季度总结会", start_time: "2026-05-18T15:00:00", end_time: "2026-05-18T17:00:00", location: "大会议室", status: "upcoming", description: "Q2季度工作总结与表彰", creator: "人事部", agenda: ["季度业绩汇报", "表彰环节"] },
    ];

    const participantsData = [
      { id: 1, name: "张三", department: "产品部", role: "高级产品经理", background: "5年B端产品经验，主导过2个核心项目", collab: "与开发团队协作12次，评审通过率95%", conflicts: 0, avatar: "张" },
      { id: 2, name: "李四", department: "技术部", role: "架构师", background: "10年后端开发经验，专精高并发架构", collab: "主导过3次技术升级，跨部门协作6次", conflicts: 1, avatar: "李" },
      { id: 3, name: "王五", department: "设计部", role: "设计主管", background: "专注用户体验设计，获2项设计专利", collab: "负责过5个核心项目，与产品部协作密切", conflicts: 0, avatar: "王" },
      { id: 4, name: "赵六", department: "运营部", role: "运营总监", background: "8年运营经验，擅长用户增长", collab: "策划过10+次大型活动", conflicts: 0, avatar: "赵" },
    ];

    const documentsData = [
      { id: 1, meeting_id: 1, name: "产品路线图_v3.pdf", is_required: true, is_read: false, uploaded_by: "张三", uploaded_at: "2026-05-12" },
      { id: 2, meeting_id: 1, name: "竞品分析报告.docx", is_required: true, is_read: true, uploaded_by: "王五", uploaded_at: "2026-05-11" },
      { id: 3, meeting_id: 1, name: "技术可行性评估.xlsx", is_required: false, is_read: false, uploaded_by: "李四", uploaded_at: "2026-05-10" },
    ];

    const todosData = [
      { id: 1, meeting_id: 1, content: "完成技术架构设计文档初稿", assignee: "李四", deadline: "2026-05-20", status: "pending", priority: "high" },
      { id: 2, meeting_id: 1, content: "更新产品原型图并提交评审", assignee: "王五", deadline: "2026-05-18", status: "done", priority: "medium" },
      { id: 3, meeting_id: 1, content: "整理竞品数据对比表（6家）", assignee: "张三", deadline: "2026-05-22", status: "pending", priority: "low" },
    ];

    const resolutionsData = [
      { id: 1, meeting_id: 1, content: "Q3优先发展用户增长模块", decision: "通过", votes: "5/5", deadline: "2026-05-30" },
      { id: 2, meeting_id: 1, content: "技术架构采用渐进式重构", decision: "通过", votes: "4/5", deadline: "2026-06-15" },
    ];

    const conflictsData = [
      { id: 1, meeting_id: 1, type: "room", message: "会议室在目标时段已被占用（14:00-15:30 运维评审会）" },
      { id: 2, meeting_id: 1, type: "time", message: "与「产品周会」时间冲突（14:00-15:00），参会人张三重复" },
    ];

    const agendaTemplates = [
      { id: 1, name: "项目启动会", items: ["项目背景介绍", "目标与范围确认", "团队分工", "时间节点讨论", "Q&A"] },
      { id: 2, name: "周例会", items: ["上周进展汇报", "本周计划", "问题与风险", "其他事项"] },
      { id: 3, name: "评审会", items: ["方案展示", "讨论与反馈", "决策确认", "后续跟进"] },
    ];

    // ==================== 路由 ====================
    const RouterContext = createContext();

    function Router(props) {
      const [path, setPath] = useState(window.location.hash.slice(1) || "/");

      useEffect(function() {
        function onHashChange() {
          setPath(window.location.hash.slice(1) || "/");
        }
        window.addEventListener("hashchange", onHashChange);
        return function() { window.removeEventListener("hashchange", onHashChange); };
      }, []);

      function navigate(newPath) {
        window.location.hash = newPath;
      }

      var params = {};
      var m = path.match(/\/(\w+)\/(\d+)/);
      if (m) { params.type = m[1]; params.id = m[2]; }

      return (
        <RouterContext.Provider value={{ path: path, navigate: navigate, params: params }}>
          {props.children}
        </RouterContext.Provider>
      );
    }

    function useRouter() { return useContext(RouterContext); }

    // ==================== Toast ====================
    function Toast(props) {
      var timerRef = useRef(null);
      var onCloseRef = useRef(props.onClose);
      onCloseRef.current = props.onClose;

      useEffect(function() {
        timerRef.current = setTimeout(function() { onCloseRef.current(); }, 2500);
        return function() { clearTimeout(timerRef.current); };
      }, []);

      var bg = props.type === "error" ? "#ef4444" : props.type === "info" ? "#3b82f6" : "#22c55e";
      var icon = props.type === "error" ? "ri-error-warning-line" : props.type === "info" ? "ri-information-line" : "ri-check-line";

      return (
        <div style={{ position: "fixed", top: 16, right: 16, zIndex: 9999, background: bg, color: "#fff", padding: "12px 20px", borderRadius: 10, boxShadow: "0 4px 12px rgba(0,0,0,0.15)", display: "flex", alignItems: "center", gap: 8, animation: "fadeIn 0.3s ease" }}>
          <i className={icon} style={{ fontSize: 18 }}></i>
          <span style={{ fontSize: 14 }}>{props.message}</span>
        </div>
      );
    }

    // ==================== 页面 ====================

    // ---------- 首页 ----------
    function HomePage() {
      var router = useRouter();
      var [toast, setToast] = useState(null);
      var toastTimer = useRef(null);

      function showToast(msg, type) {
        if (toastTimer.current) clearTimeout(toastTimer.current);
        setToast({ message: msg, type: type || "success" });
        toastTimer.current = setTimeout(function() { setToast(null); }, 2500);
      }

      var upcoming = initialMeetings.filter(function(m) { return m.status === "upcoming"; });
      var unread = documentsData.filter(function(d) { return !d.is_read; }).length;
      var pendingTodos = todosData.filter(function(t) { return t.status === "pending"; }).length;

      return (
        <div style={{ minHeight: "100vh", background: "#f5f7fa" }}>
          {toast && <Toast message={toast.message} type={toast.type} onClose={function(){ setToast(null); }} />}

          {/* 顶部栏 */}
          <div style={{ background: "linear-gradient(135deg, #2563eb, #3b82f6)", color: "#fff", padding: "24px 0" }}>
            <div style={{ maxWidth: 1100, margin: "0 auto", padding: "0 20px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <h1 style={{ fontSize: 24, fontWeight: 700, margin: 0, display: "flex", alignItems: "center", gap: 8 }}>
                  <i className="ri-calendar-schedule-line"></i> 会议助手
                </h1>
                <p style={{ fontSize: 14, opacity: 0.8, marginTop: 4 }}>轻量级会议管理，专注会前准备与会后跟进</p>
              </div>
              <button
                onClick={function() { router.navigate("/create"); }}
                style={{ background: "rgba(255,255,255,0.2)", color: "#fff", border: "1px solid rgba(255,255,255,0.3)", borderRadius: 8, padding: "10px 20px", fontSize: 14, fontWeight: 500, cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }}
              >
                <i className="ri-add-line"></i> 新建会议
              </button>
            </div>
          </div>

          <div style={{ maxWidth: 1100, margin: "0 auto", padding: "24px 20px" }}>
            {/* 统计卡片 */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 16, marginBottom: 24 }}>
              {[
                { title: "本周会议", value: initialMeetings.length, icon: "ri-calendar-line", color: "#2563eb", bg: "#dbeafe" },
                { title: "待开始", value: upcoming.length, icon: "ri-time-line", color: "#ea580c", bg: "#fff7ed" },
                { title: "待阅读文档", value: unread, icon: "ri-file-text-line", color: "#7c3aed", bg: "#f5f3ff" },
                { title: "待办事项", value: pendingTodos, icon: "ri-task-line", color: "#16a34a", bg: "#f0fdf4" },
              ].map(function(s, i) {
                return (
                  <div key={i} style={{ background: "#fff", borderRadius: 12, padding: 20, boxShadow: "0 1px 3px rgba(0,0,0,0.06)", display: "flex", alignItems: "center", gap: 16 }}>
                    <div style={{ width: 48, height: 48, borderRadius: 12, background: s.bg, display: "flex", alignItems: "center", justifyContent: "center", color: s.color, fontSize: 22 }}>
                      <i className={s.icon}></i>
                    </div>
                    <div>
                      <div style={{ fontSize: 13, color: "#9ca3af" }}>{s.title}</div>
                      <div style={{ fontSize: 28, fontWeight: 700, color: "#1f2937" }}>{s.value}</div>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* 提醒 */}
            {upcoming.length > 0 && (
              <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderRadius: 12, padding: 16, marginBottom: 24, display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ width: 40, height: 40, borderRadius: "50%", background: "#fef3c7", display: "flex", alignItems: "center", justifyContent: "center", color: "#f59e0b", fontSize: 20 }}>
                  <i className="ri-alarm-warning-line"></i>
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 600, color: "#1f2937" }}>即将开始的会议</div>
                  <div style={{ fontSize: 13, color: "#6b7280" }}>{upcoming.slice(0, 2).map(function(m){ return m.title; }).join("、")}</div>
                </div>
              </div>
            )}

            {/* 会议列表 */}
            <div style={{ background: "#fff", borderRadius: 12, boxShadow: "0 1px 3px rgba(0,0,0,0.06)", overflow: "hidden" }}>
              <div style={{ padding: "16px 20px", borderBottom: "1px solid #f3f4f6", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <h2 style={{ margin: 0, fontSize: 16, fontWeight: 600, color: "#1f2937" }}>会议列表</h2>
              </div>
              <div style={{ padding: 16, display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(320px, 1fr))", gap: 16 }}>
                {initialMeetings.map(function(meeting) {
                  var statusMap = {
                    upcoming: { label: "待开始", bg: "#dbeafe", color: "#2563eb" },
                    ongoing: { label: "进行中", bg: "#fef3c7", color: "#d97706" },
                    ended: { label: "已结束", bg: "#f3f4f6", color: "#6b7280" },
                  };
                  var st = statusMap[meeting.status];
                  return (
                    <div
                      key={meeting.id}
                      onClick={function() { router.navigate("/meeting/" + meeting.id); }}
                      style={{ border: "1px solid #e5e7eb", borderRadius: 10, padding: 16, cursor: "pointer", transition: "all 0.2s" }}
                      onMouseOver={function(e){ e.currentTarget.style.borderColor = "#93c5fd"; e.currentTarget.style.boxShadow = "0 4px 12px rgba(0,0,0,0.08)"; }}
                      onMouseOut={function(e){ e.currentTarget.style.borderColor = "#e5e7eb"; e.currentTarget.style.boxShadow = "none"; }}
                    >
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
                        <h3 style={{ margin: 0, fontSize: 15, fontWeight: 600, color: "#1f2937", flex: 1 }}>{meeting.title}</h3>
                        <span style={{ background: st.bg, color: st.color, padding: "3px 10px", borderRadius: 20, fontSize: 12, fontWeight: 500, whiteSpace: "nowrap" }}>{st.label}</span>
                      </div>
                      <div style={{ fontSize: 13, color: "#6b7280", display: "flex", flexDirection: "column", gap: 6 }}>
                        <div><i className="ri-calendar-line" style={{ marginRight: 6, width: 16 }}></i>{new Date(meeting.start_time).toLocaleString("zh-CN")}</div>
                        <div><i className="ri-map-pin-line" style={{ marginRight: 6, width: 16 }}></i>{meeting.location}</div>
                        <div><i className="ri-user-line" style={{ marginRight: 6, width: 16 }}></i>{meeting.creator}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ---------- 新建会议 ----------
    function CreateMeetingPage() {
      var router = useRouter();
      var [toast, setToast] = useState(null);
      var toastTimer = useRef(null);

      function showToast(msg, type) {
        if (toastTimer.current) clearTimeout(toastTimer.current);
        setToast({ message: msg, type: type || "success" });
        toastTimer.current = setTimeout(function() { setToast(null); }, 2500);
      }

      var [form, setForm] = useState({
        title: "", start_time: "", end_time: "", location: "", description: "",
        agenda: [""], participants: [], reminders: [30],
      });

      function setField(key, val) {
        var newForm = Object.assign({}, form);
        newForm[key] = val;
        setForm(newForm);
      }

      function applyTemplate(e) {
        var tid = parseInt(e.target.value);
        var tpl = agendaTemplates.find(function(t) { return t.id === tid; });
        if (tpl) {
          setField("agenda", tpl.items.slice());
          showToast("已应用「" + tpl.name + "」模板");
        }
      }

      function addAgendaItem() {
        setField("agenda", form.agenda.concat([""]));
      }

      function updateAgendaItem(idx, val) {
        var arr = form.agenda.slice();
        arr[idx] = val;
        setField("agenda", arr);
      }

      function removeAgendaItem(idx) {
        if (form.agenda.length > 1) {
          setField("agenda", form.agenda.filter(function(_, i) { return i !== idx; }));
        }
      }

      function toggleParticipant(pid) {
        if (form.participants.indexOf(pid) >= 0) {
          setField("participants", form.participants.filter(function(id) { return id !== pid; }));
        } else {
          setField("participants", form.participants.concat([pid]));
        }
      }

      function toggleReminder(mins) {
        if (form.reminders.indexOf(mins) >= 0) {
          setField("reminders", form.reminders.filter(function(m) { return m !== mins; }));
        } else {
          setField("reminders", form.reminders.concat([mins]));
        }
      }

      function handleSubmit(e) {
        e.preventDefault();
        if (!form.title.trim()) { showToast("请填写会议主题", "error"); return; }
        if (!form.start_time) { showToast("请选择开始时间", "error"); return; }
        showToast("会议创建成功！");
        setTimeout(function() { router.navigate("/"); }, 1500);
      }

      var inputStyle = { width: "100%", padding: "10px 12px", border: "1px solid #e5e7eb", borderRadius: 8, fontSize: 14, outline: "none", transition: "border-color 0.2s" };
      var labelStyle = { display: "block", fontSize: 14, fontWeight: 500, color: "#374151", marginBottom: 6 };

      return (
        <div style={{ minHeight: "100vh", background: "#f5f7fa" }}>
          {toast && <Toast message={toast.message} type={toast.type} onClose={function(){ setToast(null); }} />}

          {/* 顶部栏 */}
          <div style={{ background: "#fff", borderBottom: "1px solid #e5e7eb", position: "sticky", top: 0, zIndex: 10 }}>
            <div style={{ maxWidth: 800, margin: "0 auto", padding: "16px 20px", display: "flex", alignItems: "center", gap: 16 }}>
              <button onClick={function() { router.navigate("/"); }} style={{ background: "none", border: "none", cursor: "pointer", padding: 8, borderRadius: 8, color: "#6b7280", fontSize: 20 }}>
                <i className="ri-arrow-left-line"></i>
              </button>
              <h1 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: "#1f2937" }}>新建会议</h1>
            </div>
          </div>

          <form onSubmit={handleSubmit} style={{ maxWidth: 800, margin: "0 auto", padding: "24px 20px" }}>
            {/* 基本信息 */}
            <div style={{ background: "#fff", borderRadius: 12, boxShadow: "0 1px 3px rgba(0,0,0,0.06)", marginBottom: 20 }}>
              <div style={{ padding: "14px 20px", borderBottom: "1px solid #f3f4f6", fontWeight: 600, color: "#1f2937", display: "flex", alignItems: "center", gap: 8 }}>
                <i className="ri-information-line" style={{ color: "#3b82f6" }}></i> 基本信息
              </div>
              <div style={{ padding: 20, display: "flex", flexDirection: "column", gap: 16 }}>
                <div>
                  <label style={labelStyle}>会议主题</label>
                  <input style={inputStyle} placeholder="输入会议主题" value={form.title} onChange={function(e){ setField("title", e.target.value); }} />
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                  <div>
                    <label style={labelStyle}>开始时间</label>
                    <input type="datetime-local" style={inputStyle} value={form.start_time} onChange={function(e){ setField("start_time", e.target.value); }} />
                  </div>
                  <div>
                    <label style={labelStyle}>结束时间</label>
                    <input type="datetime-local" style={inputStyle} value={form.end_time} onChange={function(e){ setField("end_time", e.target.value); }} />
                  </div>
                </div>
                <div>
                  <label style={labelStyle}>地点/会议室</label>
                  <input style={inputStyle} placeholder="如：A301会议室" value={form.location} onChange={function(e){ setField("location", e.target.value); }} />
                </div>
                <div>
                  <label style={labelStyle}>会议描述</label>
                  <textarea style={Object.assign({}, inputStyle, { resize: "none", height: 80 })} placeholder="输入会议背景和目标" value={form.description} onChange={function(e){ setField("description", e.target.value); }} />
                </div>
              </div>
            </div>

            {/* 议题 */}
            <div style={{ background: "#fff", borderRadius: 12, boxShadow: "0 1px 3px rgba(0,0,0,0.06)", marginBottom: 20 }}>
              <div style={{ padding: "14px 20px", borderBottom: "1px solid #f3f4f6", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ fontWeight: 600, color: "#1f2937", display: "flex", alignItems: "center", gap: 8 }}>
                  <i className="ri-list-check-2" style={{ color: "#22c55e" }}></i> 议题清单
                </span>
                <select onChange={applyTemplate} style={{ padding: "6px 12px", border: "1px solid #e5e7eb", borderRadius: 8, fontSize: 13, background: "#fff", cursor: "pointer" }}>
                  <option value="">选择议题模板</option>
                  {agendaTemplates.map(function(t) { return <option key={t.id} value={t.id}>{t.name}</option>; })}
                </select>
              </div>
              <div style={{ padding: 20, display: "flex", flexDirection: "column", gap: 10 }}>
                {form.agenda.map(function(item, idx) {
                  return (
                    <div key={idx} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{ width: 24, height: 24, borderRadius: "50%", background: "#dbeafe", color: "#2563eb", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 600, flexShrink: 0 }}>{idx + 1}</span>
                      <input style={Object.assign({}, inputStyle, { flex: 1 })} placeholder={"议题 " + (idx + 1)} value={item} onChange={function(e){ updateAgendaItem(idx, e.target.value); }} />
                      {form.agenda.length > 1 && (
                        <button type="button" onClick={function(){ removeAgendaItem(idx); }} style={{ background: "none", border: "none", cursor: "pointer", color: "#ef4444", fontSize: 18, padding: 4 }}>
                          <i className="ri-delete-bin-line"></i>
                        </button>
                      )}
                    </div>
                  );
                })}
                <button type="button" onClick={addAgendaItem} style={{ width: "100%", padding: "10px", border: "1px dashed #d1d5db", borderRadius: 8, background: "#fafafa", cursor: "pointer", fontSize: 14, color: "#6b7280", display: "flex", alignItems: "center", justifyContent: "center", gap: 4 }}>
                  <i className="ri-add-line"></i> 添加议题
                </button>
              </div>
            </div>

            {/* 参会人员 */}
            <div style={{ background: "#fff", borderRadius: 12, boxShadow: "0 1px 3px rgba(0,0,0,0.06)", marginBottom: 20 }}>
              <div style={{ padding: "14px 20px", borderBottom: "1px solid #f3f4f6", fontWeight: 600, color: "#1f2937", display: "flex", alignItems: "center", gap: 8 }}>
                <i className="ri-user-add-line" style={{ color: "#7c3aed" }}></i> 参会人员
              </div>
              <div style={{ padding: 20, display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 12 }}>
                {participantsData.map(function(p) {
                  var selected = form.participants.indexOf(p.id) >= 0;
                  return (
                    <label key={p.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: 12, borderRadius: 8, border: selected ? "2px solid #3b82f6" : "1px solid #e5e7eb", background: selected ? "#eff6ff" : "#fff", cursor: "pointer", transition: "all 0.2s" }}>
                      <input type="checkbox" checked={selected} onChange={function(){ toggleParticipant(p.id); }} style={{ width: 16, height: 16, accentColor: "#3b82f6" }} />
                      <div>
                        <div style={{ fontSize: 14, fontWeight: 500 }}>{p.name}</div>
                        <div style={{ fontSize: 12, color: "#9ca3af" }}>{p.role}</div>
                      </div>
                    </label>
                  );
                })}
              </div>
            </div>

            {/* 提醒 */}
            <div style={{ background: "#fff", borderRadius: 12, boxShadow: "0 1px 3px rgba(0,0,0,0.06)", marginBottom: 20 }}>
              <div style={{ padding: "14px 20px", borderBottom: "1px solid #f3f4f6", fontWeight: 600, color: "#1f2937", display: "flex", alignItems: "center", gap: 8 }}>
                <i className="ri-alarm-line" style={{ color: "#f59e0b" }}></i> 智能提醒
              </div>
              <div style={{ padding: 20, display: "flex", flexWrap: "wrap", gap: 12 }}>
                {[15, 30, 60, 120].map(function(mins) {
                  var selected = form.reminders.indexOf(mins) >= 0;
                  return (
                    <label key={mins} style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 16px", borderRadius: 8, border: selected ? "2px solid #f59e0b" : "1px solid #e5e7eb", background: selected ? "#fffbeb" : "#fff", cursor: "pointer", transition: "all 0.2s" }}>
                      <input type="checkbox" checked={selected} onChange={function(){ toggleReminder(mins); }} style={{ width: 16, height: 16, accentColor: "#f59e0b" }} />
                      <span style={{ fontSize: 14 }}>{mins >= 60 ? (mins / 60) + "小时前" : mins + "分钟前"}</span>
                    </label>
                  );
                })}
              </div>
            </div>

            {/* 按钮 */}
            <div style={{ display: "flex", gap: 12 }}>
              <button type="button" onClick={function() { router.navigate("/"); }} style={{ flex: 1, padding: "12px", border: "1px solid #d1d5db", borderRadius: 8, background: "#fff", fontSize: 14, fontWeight: 500, cursor: "pointer", color: "#374151" }}>
                取消
              </button>
              <button type="submit" style={{ flex: 1, padding: "12px", border: "none", borderRadius: 8, background: "#2563eb", color: "#fff", fontSize: 14, fontWeight: 500, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 4 }}>
                <i className="ri-check-line"></i> 创建会议
              </button>
            </div>
          </form>
        </div>
      );
    }

    // ---------- 会议详情 ----------
    function MeetingDetailPage() {
      var router = useRouter();
      var meetingId = parseInt(router.params.id) || 1;
      var meeting = initialMeetings.find(function(m) { return m.id === meetingId; }) || initialMeetings[0];

      var [tab, setTab] = useState("pre");
      var [toast, setToast] = useState(null);
      var toastTimer = useRef(null);
      var [recording, setRecording] = useState(false);
      var [transcript, setTranscript] = useState("");
      var [docs, setDocs] = useState(documentsData.filter(function(d) { return d.meeting_id === meetingId; }));
      var [todoList, setTodoList] = useState(todosData.filter(function(t) { return t.meeting_id === meetingId; }));
      var [resList, setResList] = useState(resolutionsData.filter(function(r) { return r.meeting_id === meetingId; }));

      function showToast(msg, type) {
        if (toastTimer.current) clearTimeout(toastTimer.current);
        setToast({ message: msg, type: type || "success" });
        toastTimer.current = setTimeout(function() { setToast(null); }, 2500);
      }

      var meetingConflicts = conflictsData.filter(function(c) { return c.meeting_id === meetingId; });

      function markRead(docId) {
        setDocs(docs.map(function(d) { return d.id === docId ? Object.assign({}, d, { is_read: true }) : d; }));
        showToast("已标记为已读");
      }

      function toggleRecord() {
        if (!recording) {
          setRecording(true);
          setTranscript("张三：今天的议题是Q3规划，先回顾下上季度数据...\n李四：技术侧需要评估工时，建议分两周迭代...\n王五：预算方面建议控制在50万以内，优先核心功能...");
        } else {
          setRecording(false);
          showToast("转写内容已保存");
        }
      }

      function toggleTodo(todoId) {
        setTodoList(todoList.map(function(t) {
          if (t.id === todoId) return Object.assign({}, t, { status: t.status === "done" ? "pending" : "done" });
          return t;
        }));
      }

      function addTodo() {
        setTodoList(todoList.concat([{ id: Date.now(), meeting_id: meetingId, content: "", assignee: "", deadline: "", status: "pending", priority: "medium" }]));
      }

      function updateTodoField(todoId, field, value) {
        setTodoList(todoList.map(function(t) { return t.id === todoId ? Object.assign({}, t, { [field]: value }) : t; }));
      }

      function addResolution() {
        setResList(resList.concat([{ id: Date.now(), meeting_id: meetingId, content: "", decision: "待定", votes: "", deadline: "" }]));
      }

      function updateResField(resId, field, value) {
        setResList(resList.map(function(r) { return r.id === resId ? Object.assign({}, r, { [field]: value }) : r; }));
      }

      var statusMap = {
        upcoming: { label: "待开始", bg: "#dbeafe", color: "#2563eb" },
        ongoing: { label: "进行中", bg: "#fef3c7", color: "#d97706" },
        ended: { label: "已结束", bg: "#f3f4f6", color: "#6b7280" },
      };
      var st = statusMap[meeting.status];

      var tabs = [
        { id: "pre", label: "会前准备", icon: "ri-file-list-3-line" },
        { id: "during", label: "会中辅助", icon: "ri-record-circle-line" },
        { id: "post", label: "会后跟进", icon: "ri-task-line" },
      ];

      var cardStyle = { background: "#fff", borderRadius: 12, boxShadow: "0 1px 3px rgba(0,0,0,0.06)", overflow: "hidden", marginBottom: 20 };
      var cardHeadStyle = { padding: "14px 20px", borderBottom: "1px solid #f3f4f6", fontWeight: 600, color: "#1f2937", display: "flex", justifyContent: "space-between", alignItems: "center" };
      var cardBodyStyle = { padding: 20 };
      var btnStyle = { padding: "8px 16px", borderRadius: 8, fontSize: 13, fontWeight: 500, cursor: "pointer", display: "flex", alignItems: "center", gap: 4, border: "none", transition: "all 0.2s" };

      return (
        <div style={{ minHeight: "100vh", background: "#f5f7fa" }}>
          {toast && <Toast message={toast.message} type={toast.type} onClose={function(){ setToast(null); }} />}

          {/* 顶部栏 */}
          <div style={{ background: "#fff", borderBottom: "1px solid #e5e7eb", position: "sticky", top: 0, zIndex: 10 }}>
            <div style={{ maxWidth: 900, margin: "0 auto", padding: "16px 20px", display: "flex", alignItems: "center", gap: 16 }}>
              <button onClick={function() { router.navigate("/"); }} style={{ background: "none", border: "none", cursor: "pointer", padding: 8, borderRadius: 8, color: "#6b7280", fontSize: 20 }}>
                <i className="ri-arrow-left-line"></i>
              </button>
              <div style={{ flex: 1 }}>
                <h1 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: "#1f2937" }}>{meeting.title}</h1>
                <div style={{ display: "flex", gap: 16, fontSize: 13, color: "#6b7280", marginTop: 4 }}>
                  <span><i className="ri-calendar-line" style={{ marginRight: 4 }}></i>{new Date(meeting.start_time).toLocaleString("zh-CN")}</span>
                  <span><i className="ri-map-pin-line" style={{ marginRight: 4 }}></i>{meeting.location}</span>
                </div>
              </div>
              <span style={{ background: st.bg, color: st.color, padding: "4px 12px", borderRadius: 20, fontSize: 13, fontWeight: 500 }}>{st.label}</span>
            </div>
          </div>

          <div style={{ maxWidth: 900, margin: "0 auto", padding: "20px 20px" }}>
            {/* Tab */}
            <div style={{ display: "flex", borderBottom: "2px solid #e5e7eb", marginBottom: 24 }}>
              {tabs.map(function(t) {
                return (
                  <button key={t.id} onClick={function(){ setTab(t.id); }}
                    style={{ padding: "12px 20px", fontSize: 14, fontWeight: 500, border: "none", background: "none", cursor: "pointer", display: "flex", alignItems: "center", gap: 6, color: tab === t.id ? "#2563eb" : "#6b7280", borderBottom: tab === t.id ? "2px solid #2563eb" : "2px solid transparent", marginBottom: -2, transition: "all 0.2s" }}>
                    <i className={t.icon}></i> {t.label}
                  </button>
                );
              })}
            </div>

            {/* === 会前准备 === */}
            {tab === "pre" && (
              <div>
                {/* 冲突检测 */}
                {meetingConflicts.length > 0 && (
                  <div style={Object.assign({}, cardStyle, { border: "1px solid #fde68a", background: "#fffbeb" })}>
                    <div style={Object.assign({}, cardHeadStyle, { color: "#92400e" })}>
                      <span style={{ display: "flex", alignItems: "center", gap: 8 }}><i className="ri-alarm-warning-line" style={{ color: "#f59e0b" }}></i> 冲突检测提醒</span>
                    </div>
                    <div style={cardBodyStyle}>
                      {meetingConflicts.map(function(c, i) {
                        var isRoom = c.type === "room";
                        return (
                          <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8, fontSize: 14 }}>
                            <span style={{ background: isRoom ? "#fef3c7" : "#fee2e2", color: isRoom ? "#b45309" : "#dc2626", padding: "2px 10px", borderRadius: 12, fontSize: 12, fontWeight: 500 }}>
                              {isRoom ? "会议室冲突" : "时间冲突"}
                            </span>
                            <span style={{ color: "#6b7280" }}>{c.message}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* 参会者画像 */}
                <div style={cardStyle}>
                  <div style={cardHeadStyle}>
                    <span style={{ display: "flex", alignItems: "center", gap: 8 }}><i className="ri-user-star-line" style={{ color: "#7c3aed" }}></i> 参会者画像</span>
                  </div>
                  <div style={Object.assign({}, cardBodyStyle, { display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(250px, 1fr))", gap: 16 })}>
                    {participantsData.slice(0, 3).map(function(p) {
                      return (
                        <div key={p.id} style={{ border: "1px solid #f3f4f6", borderRadius: 10, padding: 16 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
                            <div style={{ width: 40, height: 40, borderRadius: "50%", background: "linear-gradient(135deg, #60a5fa, #a78bfa)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 600, fontSize: 16 }}>{p.avatar}</div>
                            <div>
                              <div style={{ fontWeight: 600, fontSize: 15 }}>{p.name}</div>
                              <div style={{ fontSize: 12, color: "#9ca3af" }}>{p.role}</div>
                            </div>
                          </div>
                          <div style={{ fontSize: 13, color: "#6b7280", display: "flex", flexDirection: "column", gap: 6 }}>
                            <div><span style={{ color: "#9ca3af" }}>背景：</span>{p.background}</div>
                            <div><span style={{ color: "#9ca3af" }}>协作：</span>{p.collab}</div>
                            {p.conflicts > 0 && (
                              <div style={{ color: "#ef4444", fontSize: 12, display: "flex", alignItems: "center", gap: 4 }}>
                                <i className="ri-error-warning-line"></i> 检测到 {p.conflicts} 项潜在冲突
                              </div>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* 会前文档 */}
                <div style={cardStyle}>
                  <div style={cardHeadStyle}>
                    <span style={{ display: "flex", alignItems: "center", gap: 8 }}><i className="ri-file-text-line" style={{ color: "#3b82f6" }}></i> 会前文档</span>
                    <button onClick={function(){ showToast("已一键归集相关文档（模拟：3份历史文档）"); }} style={Object.assign({}, btnStyle, { background: "#fff", border: "1px solid #d1d5db", color: "#374151" })}>
                      <i className="ri-folder-add-line"></i> 一键归集文档
                    </button>
                  </div>
                  <div style={cardBodyStyle}>
                    {docs.map(function(doc) {
                      return (
                        <div key={doc.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 16px", background: "#f9fafb", borderRadius: 8, marginBottom: 10 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                            <i className="ri-file-pdf-line" style={{ fontSize: 24, color: "#ef4444" }}></i>
                            <div>
                              <div style={{ fontWeight: 500, fontSize: 14, color: "#1f2937" }}>{doc.name}</div>
                              <div style={{ fontSize: 12, color: "#9ca3af" }}>上传者：{doc.uploaded_by} · {doc.uploaded_at}</div>
                            </div>
                          </div>
                          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            {doc.is_required && <span style={{ background: "#fee2e2", color: "#dc2626", padding: "2px 8px", borderRadius: 10, fontSize: 12, fontWeight: 500 }}>必读</span>}
                            {doc.is_read ? (
                              <span style={{ background: "#dcfce7", color: "#16a34a", padding: "2px 8px", borderRadius: 10, fontSize: 12, fontWeight: 500, display: "flex", alignItems: "center", gap: 2 }}>
                                <i className="ri-check-line"></i> 已读
                              </span>
                            ) : (
                              <button onClick={function(){ markRead(doc.id); }} style={Object.assign({}, btnStyle, { background: "none", border: "none", color: "#3b82f6", padding: "4px 8px" })}>
                                <i className="ri-checkbox-circle-line"></i> 标记已读
                              </button>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* 议题清单 */}
                <div style={cardStyle}>
                  <div style={cardHeadStyle}>
                    <span style={{ display: "flex", alignItems: "center", gap: 8 }}><i className="ri-list-check-2" style={{ color: "#22c55e" }}></i> 议题清单</span>
                  </div>
                  <div style={cardBodyStyle}>
                    {meeting.agenda.map(function(item, idx) {
                      return (
                        <div key={idx} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 16px", background: "#f9fafb", borderRadius: 8, marginBottom: 8 }}>
                          <span style={{ width: 24, height: 24, borderRadius: "50%", background: "#dcfce7", color: "#16a34a", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 600 }}>{idx + 1}</span>
                          <span style={{ fontSize: 14, color: "#374151" }}>{item}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}

            {/* === 会中辅助 === */}
            {tab === "during" && (
              <div>
                {/* 语音转纪要 */}
                <div style={cardStyle}>
                  <div style={cardHeadStyle}>
                    <span style={{ display: "flex", alignItems: "center", gap: 8 }}><i className="ri-mic-line" style={{ color: "#ef4444" }}></i> 语音转纪要</span>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      {recording && (
                        <span style={{ background: "#fef3c7", color: "#d97706", padding: "4px 12px", borderRadius: 12, fontSize: 12, fontWeight: 500, display: "flex", alignItems: "center", gap: 4 }}>
                          <i className="ri-radio-button-line" style={{ animation: "fadeIn 1s infinite" }}></i> 正在录音...
                        </span>
                      )}
                      <button onClick={toggleRecord} style={Object.assign({}, btnStyle, { background: recording ? "#ef4444" : "#2563eb", color: "#fff" })}>
                        <i className={recording ? "ri-stop-circle-line" : "ri-play-circle-line"}></i>
                        {recording ? "停止录音" : "开始录音"}
                      </button>
                    </div>
                  </div>
                  <div style={cardBodyStyle}>
                    <textarea
                      value={transcript}
                      onChange={function(e) { setTranscript(e.target.value); }}
                      placeholder="录音内容将显示在这里..."
                      style={{ width: "100%", height: 180, padding: "12px 16px", border: "1px solid #e5e7eb", borderRadius: 8, fontSize: 14, resize: "none", outline: "none", fontFamily: "inherit" }}
                    />
                    <div style={{ marginTop: 12 }}>
                      <button onClick={function(){
                        setTranscript("张三：今天的议题是Q3规划，先回顾下上季度数据...\n李四：技术侧需要评估工时，建议分两周迭代...\n王五：预算方面建议控制在50万以内，优先核心功能...");
                      }} style={Object.assign({}, btnStyle, { background: "#fff", border: "1px solid #d1d5db", color: "#374151" })}>
                        <i className="ri-robot-line"></i> 模拟AI转写
                      </button>
                    </div>
                  </div>
                </div>

                {/* 议题进度 */}
                <div style={cardStyle}>
                  <div style={cardHeadStyle}>
                    <span style={{ display: "flex", alignItems: "center", gap: 8 }}><i className="ri-progress-1-line" style={{ color: "#3b82f6" }}></i> 议题进度</span>
                  </div>
                  <div style={cardBodyStyle}>
                    {meeting.agenda.map(function(item, idx) {
                      return (
                        <div key={idx} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
                          <input type="checkbox" style={{ width: 18, height: 18, accentColor: "#2563eb" }} />
                          <span style={{ flex: 1, fontSize: 14, color: "#374151" }}>{item}</span>
                          <span style={{ background: "#dbeafe", color: "#2563eb", padding: "2px 10px", borderRadius: 10, fontSize: 12, fontWeight: 500 }}>进行中</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}

            {/* === 会后跟进 === */}
            {tab === "post" && (
              <div>
                {/* 会议简报 */}
                <div style={cardStyle}>
                  <div style={cardHeadStyle}>
                    <span style={{ display: "flex", alignItems: "center", gap: 8 }}><i className="ri-article-line" style={{ color: "#3b82f6" }}></i> 会议简报</span>
                    <div style={{ display: "flex", gap: 8 }}>
                      <button onClick={function(){ showToast("AI摘要已生成！"); }} style={Object.assign({}, btnStyle, { background: "#fff", border: "1px solid #d1d5db", color: "#374151" })}>
                        <i className="ri-magic-line"></i> 一键生成AI摘要
                      </button>
                      <button onClick={function(){ showToast("简报已同步给未参会者"); }} style={Object.assign({}, btnStyle, { background: "#fff", border: "1px solid #d1d5db", color: "#374151" })}>
                        <i className="ri-send-plane-line"></i> 同步给未参会者
                      </button>
                    </div>
                  </div>
                  <div style={cardBodyStyle}>
                    <div style={{ background: "#f9fafb", borderRadius: 8, padding: 16 }}>
                      <h4 style={{ margin: "0 0 12px", fontWeight: 600, color: "#1f2937" }}>【会议简报】</h4>
                      {[
                        "确定Q3产品路线图，优先用户增长模块",
                        "技术团队需在两周内完成架构评审",
                        "市场投放预算调整为50万，分阶段执行",
                      ].map(function(line, i) {
                        return (
                          <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 8, marginBottom: 8, fontSize: 14, color: "#4b5563" }}>
                            <i className="ri-checkbox-circle-line" style={{ color: "#22c55e", marginTop: 2 }}></i>
                            {line}
                          </div>
                        );
                      })}
                      <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                        {["Q3路线图", "架构评审", "预算调整"].map(function(tag) {
                          return <span key={tag} style={{ background: "#dbeafe", color: "#2563eb", padding: "2px 10px", borderRadius: 10, fontSize: 12 }}>{tag}</span>;
                        })}
                      </div>
                    </div>
                  </div>
                </div>

                {/* 待办事项 */}
                <div style={cardStyle}>
                  <div style={cardHeadStyle}>
                    <span style={{ display: "flex", alignItems: "center", gap: 8 }}><i className="ri-task-line" style={{ color: "#f59e0b" }}></i> 待办事项</span>
                    <button onClick={addTodo} style={Object.assign({}, btnStyle, { background: "#fff", border: "1px solid #d1d5db", color: "#374151" })}>
                      <i className="ri-add-line"></i> 添加待办
                    </button>
                  </div>
                  <div style={cardBodyStyle}>
                    {todoList.map(function(todo) {
                      var isDone = todo.status === "done";
                      return (
                        <div key={todo.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 16px", borderRadius: 8, border: isDone ? "1px solid #bbf7d0" : "1px solid #e5e7eb", background: isDone ? "#f0fdf4" : "#f9fafb", marginBottom: 10 }}>
                          <input type="checkbox" checked={isDone} onChange={function(){ toggleTodo(todo.id); }} style={{ width: 18, height: 18, accentColor: "#2563eb" }} />
                          <input value={todo.content} onChange={function(e){ updateTodoField(todo.id, "content", e.target.value); }} placeholder="待办内容" style={{ flex: 1, border: "none", background: "transparent", fontSize: 14, outline: "none", color: "#374151" }} />
                          <input type="date" value={todo.deadline} onChange={function(e){ updateTodoField(todo.id, "deadline", e.target.value); }} style={{ fontSize: 12, border: "1px solid #e5e7eb", borderRadius: 6, padding: "4px 8px" }} />
                          <select value={todo.priority} onChange={function(e){ updateTodoField(todo.id, "priority", e.target.value); }} style={{ fontSize: 12, border: "1px solid #e5e7eb", borderRadius: 6, padding: "4px 8px", background: "#fff" }}>
                            <option value="high">高优</option>
                            <option value="medium">中优</option>
                            <option value="low">低优</option>
                          </select>
                          <span style={{ background: isDone ? "#dcfce7" : "#fef3c7", color: isDone ? "#16a34a" : "#d97706", padding: "2px 10px", borderRadius: 10, fontSize: 12, fontWeight: 500 }}>
                            {isDone ? "已完成" : "待办"}
                          </span>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* 决议追踪 */}
                <div style={cardStyle}>
                  <div style={cardHeadStyle}>
                    <span style={{ display: "flex", alignItems: "center", gap: 8 }}><i className="ri-git-commit-line" style={{ color: "#7c3aed" }}></i> 决议追踪</span>
                    <button onClick={addResolution} style={Object.assign({}, btnStyle, { background: "#fff", border: "1px solid #d1d5db", color: "#374151" })}>
                      <i className="ri-add-line"></i> 添加决议
                    </button>
                  </div>
                  <div style={cardBodyStyle}>
                    {resList.map(function(res) {
                      var decColors = { "通过": { bg: "#dcfce7", color: "#16a34a" }, "否决": { bg: "#fee2e2", color: "#dc2626" }, "待定": { bg: "#fef3c7", color: "#d97706" } };
                      var dc = decColors[res.decision] || decColors["待定"];
                      return (
                        <div key={res.id} style={{ border: "1px solid #e5e7eb", borderRadius: 8, padding: 16, marginBottom: 12 }}>
                          <div style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
                            <div style={{ width: 32, height: 32, borderRadius: "50%", background: "#f3e8ff", display: "flex", alignItems: "center", justifyContent: "center", color: "#7c3aed" }}>
                              <i className="ri-checkbox-circle-line"></i>
                            </div>
                            <div style={{ flex: 1 }}>
                              <input value={res.content} onChange={function(e){ updateResField(res.id, "content", e.target.value); }} placeholder="决议内容" style={{ border: "none", background: "transparent", fontSize: 14, fontWeight: 500, color: "#1f2937", outline: "none", width: "100%" }} />
                              <div style={{ display: "flex", alignItems: "center", gap: 16, marginTop: 8, fontSize: 13, color: "#6b7280" }}>
                                <span><i className="ri-thumb-up-line" style={{ marginRight: 4 }}></i>投票：{res.votes || "待投票"}</span>
                                <span><i className="ri-calendar-line" style={{ marginRight: 4 }}></i>截止：{res.deadline || "待定"}</span>
                                <span style={{ background: dc.bg, color: dc.color, padding: "2px 10px", borderRadius: 10, fontSize: 12, fontWeight: 500 }}>{res.decision}</span>
                              </div>
                            </div>
                            <select value={res.decision} onChange={function(e){ updateResField(res.id, "decision", e.target.value); }} style={{ fontSize: 12, border: "1px solid #e5e7eb", borderRadius: 6, padding: "4px 8px", background: "#fff" }}>
                              <option value="待定">待定</option>
                              <option value="通过">通过</option>
                              <option value="否决">否决</option>
                            </select>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* 下次预埋 */}
                <div style={cardStyle}>
                  <div style={cardHeadStyle}>
                    <span style={{ display: "flex", alignItems: "center", gap: 8 }}><i className="ri-calendar-event-line" style={{ color: "#22c55e" }}></i> 下次预埋</span>
                  </div>
                  <div style={Object.assign({}, cardBodyStyle, { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 })}>
                    <button onClick={function(){ router.navigate("/create"); }} style={{ display: "flex", alignItems: "center", gap: 12, padding: 16, borderRadius: 8, border: "1px solid #e5e7eb", background: "#fff", cursor: "pointer", textAlign: "left" }}>
                      <i className="ri-add-circle-line" style={{ fontSize: 24, color: "#22c55e" }}></i>
                      <div>
                        <div style={{ fontWeight: 500, color: "#1f2937", fontSize: 14 }}>创建跟进会议</div>
                        <div style={{ fontSize: 12, color: "#9ca3af" }}>快速创建下次会议，自动继承议题</div>
                      </div>
                    </button>
                    <button onClick={function(){ showToast("已归档到知识库"); }} style={{ display: "flex", alignItems: "center", gap: 12, padding: 16, borderRadius: 8, border: "1px solid #e5e7eb", background: "#fff", cursor: "pointer", textAlign: "left" }}>
                      <i className="ri-archive-line" style={{ fontSize: 24, color: "#3b82f6" }}></i>
                      <div>
                        <div style={{ fontWeight: 500, color: "#1f2937", fontSize: 14 }}>归档到知识库</div>
                        <div style={{ fontSize: 12, color: "#9ca3af" }}>将会议内容存档到项目目录</div>
                      </div>
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ==================== 入口 ====================
    function App() {
      return (
        <Router>
          <RouterChild />
        </Router>
      );
    }

    function RouterChild() {
      var ctx = useRouter();
      if (ctx.path === "/") return <HomePage />;
      if (ctx.path === "/create") return <CreateMeetingPage />;
      if (ctx.path.indexOf("/meeting/") === 0) return <MeetingDetailPage />;
      return <HomePage />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
